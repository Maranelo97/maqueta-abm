<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1b1b1d",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#271901",
                        "background": "#fcf8fa",
                        "tertiary-fixed-dim": "#dec29a",
                        "primary-fixed-dim": "#bec6e0",
                        "outline-variant": "#c6c6cd",
                        "surface-container-low": "#f6f3f5",
                        "on-tertiary-fixed": "#271901",
                        "inverse-primary": "#bec6e0",
                        "on-tertiary-fixed-variant": "#574425",
                        "surface-bright": "#fcf8fa",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#0d1c2f",
                        "primary-fixed": "#dae2fd",
                        "primary-container": "#131b2e",
                        "surface-container-high": "#eae7e9",
                        "on-error": "#ffffff",
                        "inverse-surface": "#303032",
                        "inverse-on-surface": "#f3f0f2",
                        "error": "#ba1a1a",
                        "surface-variant": "#e4e2e4",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#b9c7e0",
                        "secondary-fixed": "#d5e3fd",
                        "on-surface-variant": "#45464d",
                        "on-background": "#1b1b1d",
                        "tertiary-fixed": "#fcdeb5",
                        "on-tertiary-container": "#98805d",
                        "outline": "#76777d",
                        "surface-dim": "#dcd9db",
                        "on-primary-fixed": "#131b2e",
                        "tertiary": "#000000",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#565e74",
                        "surface-container": "#f0edef",
                        "on-primary-container": "#7c839b",
                        "secondary-container": "#d5e3fd",
                        "surface-container-highest": "#e4e2e4",
                        "on-primary-fixed-variant": "#3f465c",
                        "on-secondary-fixed-variant": "#3a485c",
                        "on-secondary-container": "#57657b",
                        "on-error-container": "#93000a",
                        "secondary": "#515f74",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#fcf8fa",
                        "primary": "#000000"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "base": "4px",
                        "sm": "8px",
                        "margin": "32px",
                        "xs": "4px",
                        "gutter": "24px",
                        "xl": "48px",
                        "lg": "24px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "mono": ["monospace"],
                        "h2": ["Inter"],
                        "h1": ["Inter"],
                        "label-sm": ["Inter"],
                        "h3": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "mono": ["13px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "h3": ["20px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcf8fa;
        }
    </style>
</head>
<body class="antialiased text-on-surface">
<!-- Central Authentication Canvas -->
<main class="min-h-screen flex flex-col items-center justify-center p-gutter">
<!-- Login Card Container -->
<div class="w-full max-w-[440px] bg-surface-container-lowest border border-outline-variant p-xl flex flex-col gap-lg shadow-sm">
<!-- Identity Header -->
<header class="flex flex-col items-center text-center gap-md">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="settings_input_component">settings_input_component</span>
<span class="font-h2 text-h2 tracking-tighter text-primary">RelayOS</span>
</div>
<div class="space-y-xs">
<h1 class="font-h2 text-h2 text-on-surface">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px]">
                        Please enter your credentials to access the Relay Management system
                    </p>
</div>
</header>
<!-- Authentication Form -->
<form class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<input class="w-full px-md py-sm border border-outline-variant bg-white font-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-outline/50" id="email" placeholder="name@enterprise.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
</div>
<input class="w-full px-md py-sm border border-outline-variant bg-white font-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Secondary Actions -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-sm cursor-pointer group">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-body-md text-body-md text-primary hover:underline underline-offset-4 decoration-primary/30" href="#">Forgot password?</a>
</div>
<!-- Submit Action -->
<button class="w-full bg-primary text-on-primary py-md font-body-md font-semibold hover:opacity-90 active:scale-[0.98] transition-all mt-sm" type="submit">
                    Sign In
                </button>
</form>
<!-- Single Sign-On Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-md font-label-sm text-label-sm text-outline uppercase tracking-widest">Enterprise SSO</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- SSO Option -->
<button class="w-full border border-outline-variant py-md font-body-md flex items-center justify-center gap-sm hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="shield_with_heart">shield_with_heart</span>
                Authenticate via Okta
            </button>
</div>
<!-- System Footer -->
<footer class="mt-xl w-full max-w-[440px] flex flex-col md:flex-row items-center justify-between gap-md border-t border-outline-variant/30 pt-lg">
<div class="flex items-center gap-sm">
<div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant">System Status: Optimal</span>
</div>
<p class="font-label-sm text-label-sm text-outline">
                © 2024 RelayOS Architectural Data Management
            </p>
</footer>
</main>
<!-- Background Decorative Element (Abstract Data Visualization) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none opacity-40">
<div class="absolute top-[10%] left-[5%] w-96 h-96 bg-primary-container/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[10%] right-[5%] w-[500px] h-[500px] bg-secondary-container/10 rounded-full blur-[120px]"></div>
<!-- Subtle Grid Pattern -->
<div class="absolute inset-0" style="background-image: radial-gradient(circle, #c6c6cd 0.5px, transparent 0.5px); background-size: 48px 48px;"></div>
</div>
</body></html>
