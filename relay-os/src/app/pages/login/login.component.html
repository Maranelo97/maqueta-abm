<div class="min-h-screen flex flex-col items-center justify-center bg-[#f9f5f5] dark:bg-gray-950 px-4">

  <!-- Card -->
  <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 w-full max-w-[380px] px-6 sm:px-10 py-10 shadow-sm rounded-sm">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-7">
      <div class="flex items-center gap-2 mb-5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-gray-900 dark:text-white" stroke-width="2.5">
          <line x1="8" y1="6" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="18"/>
          <line x1="4" y1="10" x2="8" y2="10"/><line x1="16" y1="10" x2="20" y2="10"/>
          <line x1="4" y1="14" x2="8" y2="14"/><line x1="16" y1="14" x2="20" y2="14"/>
        </svg>
        <span class="text-[18px] font-bold text-gray-900 dark:text-white tracking-tight">RelayOS</span>
      </div>
      <h1 class="text-[22px] font-bold text-gray-900 dark:text-white text-center">Welcome Back</h1>
      <p class="text-[13px] text-gray-500 dark:text-gray-400 text-center mt-1 leading-snug">
        Please enter your credentials to access the<br>Relay Management system
      </p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSignIn()">
      <div class="mb-4">
        <label class="form-label block text-xs font-semibold text-gray-700 dark:text-gray-300 mb-1">Email Address</label>
        <input type="email" [(ngModel)]="email" name="email"
               placeholder="name@enterprise.com"
               class="form-input w-full bg-white dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white px-3 py-2 rounded-sm text-sm focus:outline-none focus:border-gray-500 transition-colors" autocomplete="email"/>
      </div>

      <div class="mb-4">
        <label class="form-label block text-xs font-semibold text-gray-700 dark:text-gray-300 mb-1">Password</label>
        <input type="password" [(ngModel)]="password" name="password"
               placeholder="••••••••"
               class="form-input w-full bg-white dark:bg-gray-950 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white px-3 py-2 rounded-sm text-sm focus:outline-none focus:border-gray-500 transition-colors" autocomplete="current-password"/>
      </div>

      <div class="flex items-center justify-between mb-5">
        <label class="flex items-center gap-2 cursor-pointer text-[13px] text-gray-600 dark:text-gray-400">
          <input type="checkbox" [(ngModel)]="remember" name="remember" class="accent-black dark:accent-white"/>
          Remember me
        </label>
        <a href="#" class="text-[13px] text-gray-700 dark:text-gray-300 hover:text-black dark:hover:text-white transition-colors">Forgot password?</a>
      </div>

      <button type="submit"
              class="w-full bg-black dark:bg-white text-white dark:text-black text-[13px] font-semibold py-3 hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors rounded-sm">
        Sign In
      </button>
    </form>

    <!-- SSO -->
    <div class="flex items-center gap-3 my-5">
      <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
      <span class="text-[11px] text-gray-400 dark:text-gray-500 tracking-widest uppercase font-medium">Enterprise SSO</span>
      <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
    </div>

    <button class="w-full border border-gray-200 dark:border-gray-700 text-[13px] text-gray-700 dark:text-gray-300 font-medium py-2.5 flex items-center justify-center gap-2 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors rounded-sm">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Authenticate via Okta
    </button>
  </div>

  <!-- Footer -->
  <div class="flex flex-col sm:flex-row items-center justify-between w-full max-w-[380px] mt-6 px-1 gap-2 sm:gap-0">
    <div class="flex items-center gap-1.5 text-[12px] text-gray-500 dark:text-gray-400">
      <span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span>
      System Status: <span class="text-green-600 dark:text-green-400 font-medium">Optimal</span>
    </div>
    <span class="text-[12px] text-gray-400 dark:text-gray-500 text-center sm:text-right">© 2024 RelayOS Architectural Data Management</span>
  </div>
</div>
