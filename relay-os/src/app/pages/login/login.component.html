<div class="min-h-screen flex flex-col items-center justify-center bg-[#f9f5f5]">

  <!-- Card -->
  <div class="bg-white border border-gray-200 w-[380px] px-10 py-10 shadow-sm">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-7">
      <div class="flex items-center gap-2 mb-5">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#111827" stroke-width="2.5">
          <line x1="8" y1="6" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="18"/>
          <line x1="4" y1="10" x2="8" y2="10"/><line x1="16" y1="10" x2="20" y2="10"/>
          <line x1="4" y1="14" x2="8" y2="14"/><line x1="16" y1="14" x2="20" y2="14"/>
        </svg>
        <span class="text-[18px] font-bold text-gray-900 tracking-tight">RelayOS</span>
      </div>
      <h1 class="text-[22px] font-bold text-gray-900 text-center">Welcome Back</h1>
      <p class="text-[13px] text-gray-500 text-center mt-1 leading-snug">
        Please enter your credentials to access the<br>Relay Management system
      </p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSignIn()">
      <div class="mb-4">
        <label class="form-label">Email Address</label>
        <input type="email" [(ngModel)]="email" name="email"
               placeholder="name@enterprise.com"
               class="form-input" autocomplete="email"/>
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" [(ngModel)]="password" name="password"
               placeholder="••••••••"
               class="form-input" autocomplete="current-password"/>
      </div>

      <div class="flex items-center justify-between mb-5">
        <label class="flex items-center gap-2 cursor-pointer text-[13px] text-gray-600">
          <input type="checkbox" [(ngModel)]="remember" name="remember" class="accent-black"/>
          Remember me
        </label>
        <a href="#" class="text-[13px] text-gray-700 hover:text-black transition-colors">Forgot password?</a>
      </div>

      <button type="submit"
              class="w-full bg-black text-white text-[13px] font-semibold py-3 hover:bg-gray-800 transition-colors">
        Sign In
      </button>
    </form>

    <!-- SSO -->
    <div class="flex items-center gap-3 my-5">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-[11px] text-gray-400 tracking-widest uppercase font-medium">Enterprise SSO</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <button class="w-full border border-gray-200 text-[13px] text-gray-700 font-medium py-2.5 flex items-center justify-center gap-2 hover:bg-gray-50 transition-colors">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Authenticate via Okta
    </button>
  </div>

  <!-- Footer -->
  <div class="flex items-center justify-between w-[380px] mt-6 px-1">
    <div class="flex items-center gap-1.5 text-[12px] text-gray-500">
      <span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span>
      System Status: <span class="text-green-600 font-medium">Optimal</span>
    </div>
    <span class="text-[12px] text-gray-400">© 2024 RelayOS Architectural Data Management</span>
  </div>
</div>
