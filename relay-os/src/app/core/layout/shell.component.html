<div class="flex h-screen overflow-hidden bg-white dark:bg-gray-900 transition-colors">
  <!-- ─── LEFT SIDEBAR ─── -->
  <aside class="w-[200px] shrink-0 border-r border-gray-200 dark:border-gray-800 flex flex-col bg-white dark:bg-gray-900 transition-colors">
    <div class="px-5 pt-6 pb-4 border-b border-gray-100 dark:border-gray-800">
      <div class="font-black text-[13px] tracking-tight text-gray-900 dark:text-white uppercase leading-snug transition-colors">
        Executive Control
      </div>
      <div class="text-[10px] text-gray-400 dark:text-gray-500 tracking-widest uppercase mt-0.5 transition-colors">Data Relay MGMT</div>
    </div>

    <nav class="flex-1 py-3">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="nav-active"
          class="flex items-center gap-3 px-4 py-2.5 text-[13px] text-gray-500 dark:text-gray-400 border-l-2 border-transparent hover:bg-gray-50 dark:hover:bg-gray-800 hover:text-gray-800 dark:hover:text-white transition-colors cursor-pointer"
        >
          <!-- Clusters -->
          @if (item.icon === 'clusters') {
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="5" r="2" />
              <circle cx="5" cy="19" r="2" />
              <circle cx="19" cy="19" r="2" />
              <line x1="12" y1="7" x2="5" y2="17" />
              <line x1="12" y1="7" x2="19" y2="17" />
              <line x1="5" y1="19" x2="19" y2="19" />
            </svg>
          }
          @if (item.icon === 'analytics') {
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
          }
          @if (item.icon === 'logs') {
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="18" height="18" rx="1" />
              <line x1="7" y1="8" x2="17" y2="8" />
              <line x1="7" y1="12" x2="17" y2="12" />
              <line x1="7" y1="16" x2="13" y2="16" />
            </svg>
          }
          @if (item.icon === 'config') {
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
            </svg>
          }
          @if (item.icon === 'settings') {
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
          }
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </aside>

  <!-- ─── MAIN AREA ─── -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- TOP BAR -->
    <header
      class="h-14 shrink-0 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-6 bg-white dark:bg-gray-900 transition-colors"
    >
      <div class="flex items-center gap-7">
        <div class="flex items-center gap-2 text-gray-900 dark:text-white transition-colors">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <line x1="8" y1="6" x2="8" y2="18" />
            <line x1="16" y1="6" x2="16" y2="18" />
            <line x1="4" y1="10" x2="8" y2="10" />
            <line x1="16" y1="10" x2="20" y2="10" />
            <line x1="4" y1="14" x2="8" y2="14" />
            <line x1="16" y1="14" x2="20" y2="14" />
          </svg>
          <span class="text-[14px] font-bold tracking-tight">RelayOS</span>
        </div>
        <nav class="flex items-center gap-5">
          <a
            routerLink="/dashboard"
            routerLinkActive="font-bold text-gray-900 dark:text-white"
            class="text-[13px] text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors"
            >Relays</a
          >
          <a
            routerLink="/visualizations"
            routerLinkActive="font-bold text-gray-900 dark:text-white"
            class="text-[13px] text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors"
            >Visualizations</a
          >
        </nav>
      </div>

      <div class="flex items-center gap-3">
        <!-- Theme Toggle -->
        <button
          (click)="themeService.toggleTheme()"
          class="w-8 h-8 rounded-full flex items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors focus:outline-none"
          [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
        >
          @if (themeService.theme() === 'dark') {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          } @else {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          }
        </button>

        <div
          class="w-8 h-8 rounded-full bg-linear-to-br from-gray-700 to-gray-900 dark:from-gray-600 dark:to-gray-800 flex items-center justify-center text-white text-[11px] font-bold select-none"
        >
          JD
        </div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main class="flex-1 overflow-y-auto bg-gray-50 dark:bg-gray-950 transition-colors">
      <router-outlet />
    </main>
  </div>
</div>
